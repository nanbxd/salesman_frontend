<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Регистрация — Salesman</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">Salesman</div>
    <div class="auth-title">Регистрация</div>
    <div class="auth-field">
      <label class="auth-label">Никнейм</label>
      <input class="auth-input" id="reg-username" type="text" placeholder="">
    </div>
    <div class="auth-field">
      <label class="auth-label">Пароль</label>
      <input class="auth-input" id="reg-password" type="password" placeholder="">
    </div>
    <div class="auth-field">
      <label class="auth-label">Повторение пароля</label>
      <input class="auth-input" id="reg-password2" type="password" placeholder="">
    </div>
    <button class="auth-btn" id="register-btn">Регистрация</button>
    <div class="auth-link">Есть аккаунт? <a href="login.html">Войти</a></div>
  </div>
  <script src="main.js"></script>
</body>
</html>
