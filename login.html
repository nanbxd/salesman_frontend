<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Вход</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

  <div class="auth-card">
    <div class="auth-logo">Salesman</div>
    <div class="auth-title">Войти</div>

    <div class="auth-field">
      <label class="auth-label">Никнейм</label>
      <input class="auth-input" id="login-username" type="text" placeholder="">
    </div>
    <div class="auth-field">
      <label class="auth-label">Пароль</label>
      <input class="auth-input" id="login-password" type="password" placeholder="">
    </div>

    <button class="auth-btn" id="login-btn">Войти</button>

    <div class="auth-link">
      Нету аккаунта? <a href="register.html">Зарегистрироваться</a>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
